<script>
const WORKER = 'https://legalai-worker.finmap-ia.workers.dev';

// ───────────── TRACKING CORE ─────────────
function getUTM() {
  const p = new URLSearchParams(window.location.search);
  return {
    utm_src: p.get('utm_source') || '',
    utm_cmp: p.get('utm_campaign') || '',
    utm_med: p.get('utm_medium') || '',
    ref: sessionStorage.getItem('legalai_ref') || 'directo'
  };
}

async function track(tipo, extra = {}) {
  try {
    await fetch(`${WORKER}/evento`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo,
        pagina: 'planes',
        ...getUTM(),
        ...extra
      })
    });
  } catch (_) {}
}

// ───────────── PAGE LOAD ─────────────
track('page_view');

// ───────────── PLAN CLICK ─────────────
function clickPlan(plan_id, precio) {
  sessionStorage.setItem('legalai_plan_id', plan_id);
  sessionStorage.setItem('legalai_plan_precio_usd', precio);

  track('click_plan', { plan_id, precio });

  abrirModalEmail(plan_id, precio);
}

// ───────────── MODAL OPEN ─────────────
function abrirModalEmail(plan_id, precio) {
  document.getElementById('modalEmail').classList.add('visible');

  track('modal_open', { plan_id });
}

// ───────────── EMAIL CONFIRM ─────────────
async function confirmarEmail() {
  const email = document.getElementById('inputEmailPago').value;

  if (!email) return;

  const plan_id = sessionStorage.getItem('legalai_plan_id');

  track('email_confirm', { plan_id, email });

  // seguir flujo original
  crearOrden(plan_id, email);
}

// ───────────── CREAR ORDEN ─────────────
async function crearOrden(plan_id, email) {
  const metodo_pago = modoPago === 'cripto' ? 'cripto' : 'tarjeta';

  track('inicio_pago', { plan_id, metodo_pago });

  const res = await fetch(`${WORKER}/planes/crear-orden`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      plan_id,
      metodo_pago,
      email,
      ref: getUTM().ref
    })
  });

  const data = await res.json();

  if (data.init_point) {
    window.location.href = data.init_point;
  }
}

// ───────────── RETORNO DE PAGO ─────────────
const params = new URLSearchParams(window.location.search);

if (params.get('status') === 'success') {

  const plan_id = sessionStorage.getItem('legalai_plan_id');
  const value = parseFloat(sessionStorage.getItem('legalai_plan_precio_usd') || '0');

  track('conversion_plan', { plan_id, value });

  // Google Ads
  if (value > 0) {
    gtag('event', 'conversion', {
      send_to: 'AW-18073890544',
      value: value,
      currency: 'USD'
    });
  }
}
</script>
