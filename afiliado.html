<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Afiliado — LegalAI ARG</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
--gold:#C9A84C;
--bg:#0D0D0D;
--card:#161616;
--text:#E5E5E5;
--muted:#8C8C8C;
--border:#262626;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Inter, sans-serif;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:Playfair Display, serif;
color:var(--gold);
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
}

.label{
font-size:12px;
color:var(--muted);
}

.value{
font-size:24px;
margin-top:5px;
}

.link-box{
margin-top:30px;
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
display:flex;
gap:10px;
}

input{
flex:1;
background:#111;
border:1px solid var(--border);
padding:10px;
color:white;
border-radius:6px;
}

button{
background:var(--gold);
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.table{
margin-top:30px;
}

.row{
display:grid;
grid-template-columns:repeat(5,1fr);
padding:10px;
border-bottom:1px solid var(--border);
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1 id="nombre">Verificando acceso...</h1>

<div class="cards">
<div class="card">
<div class="label">TOTAL GENERADO</div>
<div class="value" id="total">US$ 0</div>
</div>

<div class="card">
<div class="label">PENDIENTE</div>
<div class="value" id="pendiente">US$ 0</div>
</div>

<div class="card">
<div class="label">CONVERSIONES</div>
<div class="value" id="conv">0</div>
</div>
</div>

<div class="link-box">
<input id="link" readonly />
<button onclick="copiar()">Copiar</button>
</div>

<div class="table" id="tabla"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
const key = params.get("key");

if(!ref || !key){
document.getElementById("nombre").innerText="Acceso no autorizado";
throw new Error("Sin credenciales");
}

async function cargar(){
try{
const controller = new AbortController();
setTimeout(()=>controller.abort(),8000);

const res = await fetch("https://legalai-worker.finmap-ia.workers.dev/afiliado/dashboard?ref="+ref+"&key="+key,{
signal:controller.signal
});

if(!res.ok){
document.getElementById("nombre").innerText="Acceso no autorizado";
return;
}

const json = await res.json();
const data = json.data || json;

document.getElementById("nombre").innerText="Hola, "+(data.nombre || "Afiliado");

document.getElementById("total").innerText="US$ "+(data.earnings?.total || 0);
document.getElementById("pendiente").innerText="US$ "+(data.earnings?.pending || 0);
document.getElementById("conv").innerText=(data.total_conv || 0);

document.getElementById("link").value=data.link_afiliado || "";

const tabla=document.getElementById("tabla");
tabla.innerHTML="";

(data.conversiones || []).forEach(c=>{
const row=document.createElement("div");
row.className="row";
row.innerHTML=`
<div>${c.fecha || "-"}</div>
<div>${c.plan || "-"}</div>
<div>${c.monto || 0}</div>
<div>${c.comision || 0}</div>
<div>${c.estado || "-"}</div>
`;
tabla.appendChild(row);
});

}catch(e){
document.getElementById("nombre").innerText="Error al cargar";
}
}

function copiar(){
const input=document.getElementById("link");
input.select();
document.execCommand("copy");
}

cargar();
</script>

</body>
</html>
