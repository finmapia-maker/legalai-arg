name: Auditoria LegalAI

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar auditoría
        run: node scripts/auditoria.js

      - name: Guardar logs
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/auditoria-log.jsonl
          git add data/auditoria-state.json
          git add data/auditoria-metricas.json || true

          git commit -m "update auditoria logs [skip ci]" || echo "sin cambios"
          git push
