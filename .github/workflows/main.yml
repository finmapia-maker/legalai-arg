name: Auditoria LegalAI

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Verificar estructura
        run: |
          echo "Archivos raíz:"
          ls -la
          echo "Carpeta scripts:"
          ls -la scripts || true
          node -v

      - name: Ejecutar auditoría
        run: node scripts/auditoria.js
