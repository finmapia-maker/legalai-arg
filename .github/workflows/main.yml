name: Auditoria LegalAI

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    env:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Verificar estructura
        run: |
          echo "Archivos raíz:"
          ls -la
          echo "Carpeta scripts:"
          ls -la scripts || true
          node -v

      - name: Ejecutar auditoría
        run: node scripts/auditoria.js

      - name: Guardar historial en repo
        run: |
          git config user.name "legalai-auditor"
          git config user.email "legalai-auditor@users.noreply.github.com"
          git add data/auditoria-log.jsonl data/auditoria-state.json || true
          git commit -m "Actualiza auditoría diaria LegalAI" || echo "Sin cambios para commitear"
          git push || true
