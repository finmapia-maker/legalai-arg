name: Auditoria LegalAI

on:
  schedule:
    - cron: '0 11 * * *' # 08:00 Argentina
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install axios

      - name: Ejecutar auditoría
        run: node scripts/auditoria.js
