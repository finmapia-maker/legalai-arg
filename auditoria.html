<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Auditoría LegalAI</title>

<link rel="stylesheet" href="legalai-theme.css">

<style>
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.title {
  font-family: "Playfair Display", serif;
  font-size: 28px;
  color: var(--gold);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
}

.card {
  background: var(--surface);
  padding: 15px;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.kicker {
  font-size: 11px;
  color: var(--mist);
  margin-bottom: 5px;
  text-transform: uppercase;
}

.value {
  font-size: 16px;
}

.big {
  font-size: 22px;
  font-weight: bold;
}

.decision {
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: 500;
  display: inline-block;
}

.NO_CAMBIAR { background: #444; }
.OBSERVAR { background: #2b5cff; }
.PROPONER_CAMBIO { background: #2ecc71; }

.logs {
  margin-top: 25px;
}

.log-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
}

.log-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

pre {
  background: #000;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">Auditoría LegalAI</div>
  </div>

  <div class="grid" id="estado"></div>

  <div class="logs">
    <div class="title" style="font-size:20px;">Historial</div>
    <div id="logs"></div>
  </div>

</div>

<script>
async function cargarJSON(path) {
  try {
    const res = await fetch(path);
    return await res.json();
  } catch {
    return null;
  }
}

function renderEstado(data) {
  if (!data) return;

  const html = `
    <div class="card">
      <div class="kicker">Estado</div>
      <div class="big">${data.estado || "-"}</div>
    </div>

    <div class="card">
      <div class="kicker">Última decisión</div>
      <div class="decision ${data.ultima_decision}">
        ${data.ultima_decision || "-"}
      </div>
    </div>

    <div class="card">
      <div class="kicker">Fecha</div>
      <div class="value">${data.fecha || "-"}</div>
    </div>
  `;

  document.getElementById("estado").innerHTML = html;
}

function renderLogs(logs) {
  if (!logs || logs.length === 0) return;

  let html = "";

  logs.reverse().forEach(log => {
    html += `
      <div class="log-card">
        <div class="log-header">
          <div>${log.fecha}</div>
          <div class="decision ${log.decision?.decision}">
            ${log.decision?.decision || "-"}
          </div>
        </div>

        <div class="grid">

          <div>
            <div class="kicker">Resumen</div>
            <div>${log.decision?.resumen || "-"}</div>
          </div>

          <div>
            <div class="kicker">Motivo</div>
            <div>${log.decision?.motivo || "-"}</div>
          </div>

        </div>

        <div style="margin-top:10px;">
          <div class="kicker">Cambio sugerido</div>
          <pre>${JSON.stringify(log.decision?.cambio_sugerido, null, 2)}</pre>
        </div>
      </div>
    `;
  });

  document.getElementById("logs").innerHTML = html;
}

async function init() {
  const estado = await cargarJSON("data/auditoria-state.json");

  const logsRaw = await fetch("data/auditoria-log.jsonl")
    .then(r => r.text())
    .then(text => text.split("\n").filter(Boolean).map(x => JSON.parse(x)));

  renderEstado(estado);
  renderLogs(logsRaw);
}

init();
</script>

</body>
</html>
