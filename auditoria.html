<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<title>Auditoría LegalAI</title>

<!-- TIPOGRAFÍAS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root {
  --paper:#0c0e12;
  --surface:#1c2030;
  --ink:#fff;
  --mist:rgba(255,255,255,.6);
  --line:rgba(255,255,255,.08);
  --gold:#d4a847;
  --btn-bg:#d4a847;
  --btn-txt:#000;
  --shadow:0 10px 30px rgba(0,0,0,.4);
}

/* ===== BASE ===== */
body {
  font-family:'DM Sans', sans-serif;
  background:var(--paper);
  color:var(--ink);
  padding:20px;
}

/* ===== HEADER ===== */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo {
  font-family:'Playfair Display', serif;
  color:var(--gold);
  font-size:1.2rem;
}

/* ===== GRID ===== */
.grid {
  display:grid;
  grid-template-columns: 320px 1fr;
  gap:20px;
}

/* ===== CARDS ===== */
.card {
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
  box-shadow:var(--shadow);
}

/* ===== TEXT ===== */
.label {
  font-size:.65rem;
  font-family:'DM Mono', monospace;
  color:var(--gold);
  margin-bottom:4px;
}

.value {
  margin-bottom:12px;
  font-size:.9rem;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:1.8rem;
  margin-bottom:15px;
}

/* ===== DECISION ===== */
.decision {
  display:inline-block;
  padding:4px 10px;
  border-radius:6px;
  font-weight:500;
  font-size:.8rem;
}

.NO_CAMBIAR { background:#444; }
.OBSERVAR { background:#2b5cff; }
.PROPONER_CAMBIO { background:#2ecc71; color:#000; }

/* ===== LOG LIST ===== */
.log-item {
  border-bottom:1px solid var(--line);
  padding:10px 0;
  cursor:pointer;
}

.log-item:hover {
  opacity:.7;
}

.log-header {
  display:flex;
  justify-content:space-between;
  font-size:.75rem;
}

.log-body {
  font-size:.85rem;
  margin-top:5px;
  color:var(--mist);
}

/* ===== DETALLE ===== */
pre {
  background:#000;
  padding:10px;
  font-size:.7rem;
  border-radius:6px;
  overflow:auto;
}

/* ===== EMPTY ===== */
.empty {
  color:var(--mist);
  font-size:.85rem;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">LegalAI <span style="opacity:.4">Auditor</span></div>
</div>

<h1>Auditoría diaria</h1>

<div class="grid">

  <!-- ESTADO -->
  <div id="estado" class="card"></div>

  <!-- LOGS + DETALLE -->
  <div class="card">
    <div id="logs"></div>
    <hr style="margin:15px 0; border-color:var(--line);">
    <div id="detalle" class="empty">Seleccioná un log para ver detalle</div>
  </div>

</div>

<script>

async function cargarJSON(path) {
  try {
    const res = await fetch(path);
    return await res.json();
  } catch {
    return null;
  }
}

function renderEstado(data) {
  if (!data) return;

  document.getElementById("estado").innerHTML = `
    <div class="label">Estado</div>
    <div class="value">${data.estado || "-"}</div>

    <div class="label">Última decisión</div>
    <div class="value">
      <span class="decision ${data.ultima_decision}">
        ${data.ultima_decision || "-"}
      </span>
    </div>

    <div class="label">Última fecha</div>
    <div class="value">${data.fecha || "-"}</div>
  `;
}

function renderLogs(logs) {
  if (!logs || logs.length === 0) {
    document.getElementById("logs").innerHTML = `<div class="empty">Sin logs</div>`;
    return;
  }

  let html = "";

  logs.reverse().forEach((log, index) => {
    html += `
      <div class="log-item" onclick="verDetalle(${index})">
        <div class="log-header">
          <span>${log.fecha}</span>
          <span class="decision ${log.decision?.decision}">
            ${log.decision?.decision || "-"}
          </span>
        </div>
        <div class="log-body">
          ${log.decision?.resumen || "-"}
        </div>
      </div>
    `;
  });

  document.getElementById("logs").innerHTML = html;
  window._logs = logs.reverse();
}

function verDetalle(i) {
  const log = window._logs[i];

  document.getElementById("detalle").innerHTML = `
    <div class="label">Resumen</div>
    <div class="value">${log.decision?.resumen || "-"}</div>

    <div class="label">Motivo</div>
    <div class="value">${log.decision?.motivo || "-"}</div>

    <div class="label">Cambio sugerido</div>
    <pre>${JSON.stringify(log.decision?.cambio_sugerido, null, 2)}</pre>
  `;
}

async function init() {
  const estado = await cargarJSON("data/auditoria-state.json");

  const logsRaw = await fetch("data/auditoria-log.jsonl")
    .then(r => r.text())
    .then(text => text.split("\n").filter(Boolean).map(x => JSON.parse(x)));

  renderEstado(estado);
  renderLogs(logsRaw);
}

init();

</script>

</body>
</html>
